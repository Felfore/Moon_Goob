- type: entity
  id: VehicleScrubberOverlay
  name: floor scrubber overlay
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    scale: 0.75, 0.75
    sprite: _Goobstation/_floorscrubber/Objects/Vehicles/floorscrubber.rsi
    layers:
      - state: overlay
      - state: cleaning
        map: [ "cleaningLayer" ]
        visible: false
    noRot: true
    drawdepth: OverMobs # Renders above players, non-clickable
  - type: Tag
    tags:
      - HideContextMenu
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.FloorScrubberVisuals.Cleaning:
        cleaningLayer:
          Off: { visible: false }
          On:  { visible: true }

- type: entity
  parent: BaseVehicle
  id: VehicleScrubber
  name: floor scrubber
  description: A janitorial vehicle used to clean and vacuum large areas of floor. Drive over spills with the scrubber active, then dump the waste tank into a nearby drain.
  components:
  - type: Sprite
    scale: 0.75, 0.75
    sprite: _Goobstation/_floorscrubber/Objects/Vehicles/floorscrubber.rsi
    layers:
    - state: floorscrubber
    noRot: true
  - type: Vehicle
    overlayPrototype: VehicleScrubberOverlay
  - type: Appearance
  - type: FloorScrubber
    cleaningAmount: 2
    vacuumAmount: 5
    speedMultiplier: 0.5
    extraCleaningRange: 1
    cleaningShape: Frontal
    cleaningSound: /Audio/Ambience/Objects/server_fans.ogg
    cleaningSoundVolume: -6
    cleaningSoundRange: 5
  - type: FootprintOwner
    bodyDistance: 0.9
    maxBodyVolume: 15
  - type: SolutionContainerManager
    solutions:
      cleanTank:
        maxVol: 500
        reagents:
        - ReagentId: Water
          Quantity: 500
      wasteTank:
        maxVol: 1000
      print:
        maxVol: 10
  - type: DrainableSolution
    solution: wasteTank
  - type: ItemSlots
    slots:
      key_slot:
        name: vehicle-slot-component-slot-name-keys
        whitelist:
          requireAll: true
          tags:
          - VehicleKey
          - FloorScrubberKeys
        insertSound:
          path: /Audio/Effects/Vehicle/vehiclestartup.ogg
          params:
            volume: -3
  - type: UnpoweredFlashlight
  - type: PointLight
    enabled: false
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    radius: 3.5
    softness: 2
    netsync: false
  - type: Repairable
    damage:
      types:
        Blunt: -10
        Structural: -20
    fuelCost: 5
    doAfterDelay: 5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 350
        mask:
          - MobMask
        layer:
          - MobLayer
        hard: true
  - type: MovementSpeedModifier
    baseAcceleration: 5
    baseFriction: 2.0
    baseWalkSpeed: 2.5
    baseSprintSpeed: 4

- type: entity
  parent: BaseKey
  id: VehicleKeyFloorScrubber
  name: floor scrubber keys
  description: The keys to a cleaner future.
  components:
  - type: Sprite
    sprite: Objects/Vehicles/janicart.rsi
    state: keys
  - type: Tag
    tags:
    - VehicleKey
    - FloorScrubberKeys
